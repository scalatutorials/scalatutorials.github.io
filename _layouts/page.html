---
layout: default
---
<article class="mx-auto max-w-3xl px-4 py-10 sm:px-6">
  <h1 class="text-3xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">{{ page.title }}</h1>
  {% if page.tagline %}
  <p class="mt-2 text-lg text-zinc-500 dark:text-zinc-400">{{ page.tagline }}</p>
  {% endif %}
  <div class="prose prose-zinc mt-8 max-w-none dark:prose-invert">
    {{ content }}
  </div>
</article>
